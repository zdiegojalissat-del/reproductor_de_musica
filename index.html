<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player Premium</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#0f172a,#1e293b,#0f172a,#134e4a);
    background-size:400% 400%;
    animation:gradient 12s ease infinite;
    color:white;
    padding:20px;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.player{
    width:100%;
    max-width:950px;
    display:grid;
    grid-template-columns:350px 1fr;
    gap:25px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    border-radius:25px;
    padding:25px;
    box-shadow:0 10px 40px rgba(0,0,0,.4);
}

.left{
    text-align:center;
}

.cover{
    width:280px;
    height:280px;
    margin:auto;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 30px rgba(0,0,0,.4);
}

.cover img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.song-title{
    margin-top:15px;
    font-size:1.4rem;
    font-weight:700;
}

.song-artist{
    opacity:.7;
    margin-top:5px;
}

.progress-container{
    margin-top:20px;
}

.progress{
    width:100%;
    height:8px;
    appearance:none;
    cursor:pointer;
}

.time{
    display:flex;
    justify-content:space-between;
    font-size:.9rem;
    margin-top:5px;
}

.controls{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-top:20px;
}

.controls button{
    border:none;
    width:55px;
    height:55px;
    border-radius:50%;
    cursor:pointer;
    font-size:1.2rem;
    background:white;
    transition:.3s;
}

.controls button:hover{
    transform:scale(1.1);
}

.play{
    width:70px!important;
    height:70px!important;
    font-size:1.5rem!important;
}

.volume{
    margin-top:20px;
}

.volume input{
    width:100%;
}

.right{
    display:flex;
    flex-direction:column;
}

.header{
    margin-bottom:15px;
}

.header h1{
    font-size:2rem;
}

.playlist{
    overflow:auto;
    max-height:500px;
}

.track{
    padding:15px;
    margin-bottom:10px;
    border-radius:12px;
    background:rgba(255,255,255,.05);
    cursor:pointer;
    transition:.3s;
}

.track:hover{
    background:rgba(255,255,255,.15);
}

.track.active{
    background:#22c55e;
}

.footer{
    margin-top:15px;
    opacity:.7;
    font-size:.9rem;
}

@media(max-width:850px){
    .player{
        grid-template-columns:1fr;
    }

    .cover{
        width:240px;
        height:240px;
    }
}
</style>
</head>
<body>

<div class="player">

    <div class="left">

        <div class="cover">
            <img id="cover"
            src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=800">
        </div>

        <div class="song-title" id="title">
            Selecciona una canción
        </div>

        <div class="song-artist">
            Reproductor Escolar
        </div>

        <div class="progress-container">
            <input type="range"
                   class="progress"
                   id="progress"
                   value="0">

            <div class="time">
                <span id="current">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button onclick="prevSong()">⏮</button>
            <button class="play" onclick="togglePlay()">▶</button>
            <button onclick="nextSong()">⏭</button>
        </div>

        <div class="volume">
            <p>🔊 Volumen</p>
            <input type="range"
                   id="volume"
                   min="0"
                   max="1"
                   step="0.01"
                   value="1">
        </div>

    </div>

    <div class="right">

        <div class="header">
            <h1>🎵 Music Player Premium</h1>
            <p>Proyecto desarrollado para App/Web</p>
        </div>

        <div class="playlist" id="playlist"></div>

        <div class="footer">
            Alumno: TU NOMBRE AQUÍ
        </div>

    </div>

</div>

<audio id="audio"></audio>

<script>

const songs = [

{
title:"Canción 1",
file:"cancion1.mp4",
cover:"img/cover1.jpg"
},
{
title:"Canción 2",
file:"music/cancion2.mp4",
cover:"img/cover2.jpg"
},
{
title:"Canción 3",
file:"music/cancion3.mp4",
cover:"img/cover3.jpg"
},
{
title:"Canción 4",
file:"music/cancion4.mp4",
cover:"img/cover4.jpg"
},
{
title:"Canción 5",
file:"music/cancion5.mp4",
cover:"img/cover5.jpg"
},
{
title:"Canción 6",
file:"music/cancion6.mp4",
cover:"img/cover6.jpg"
},
{
title:"Canción 7",
file:"music/cancion7.mp4",
cover:"img/cover7.jpg"
},
{
title:"Canción 8",
file:"music/cancion8.mp4",
cover:"img/cover8.jpg"
},
{
title:"Canción 9",
file:"music/cancion9.mp4",
cover:"img/cover9.jpg"
},
{
title:"Canción 10",
file:"music/cancion10.mp4",
cover:"img/cover10.jpg"
}

];

const playlist=document.getElementById("playlist");
const audio=document.getElementById("audio");
const title=document.getElementById("title");
const cover=document.getElementById("cover");
const progress=document.getElementById("progress");

let currentSong=0;

songs.forEach((song,index)=>{

const div=document.createElement("div");
div.classList.add("track");

div.innerHTML=`
<strong>${song.title}</strong>
`;

div.onclick=()=>loadSong(index,true);

playlist.appendChild(div);

});

function loadSong(index,play=false){

currentSong=index;

audio.src=songs[index].file;

title.textContent=songs[index].title;

cover.src=songs[index].cover;

document.querySelectorAll(".track")
.forEach(t=>t.classList.remove("active"));

document.querySelectorAll(".track")[index]
.classList.add("active");

if(play){
audio.play();
}

}

function togglePlay(){

if(!audio.src){
loadSong(0,true);
return;
}

if(audio.paused){
audio.play();
}else{
audio.pause();
}

}

function nextSong(){

currentSong++;

if(currentSong>=songs.length){
currentSong=0;
}

loadSong(currentSong,true);

}

function prevSong(){

currentSong--;

if(currentSong<0){
currentSong=songs.length-1;
}

loadSong(currentSong,true);

}

audio.addEventListener("timeupdate",()=>{

progress.max=audio.duration || 0;
progress.value=audio.currentTime;

document.getElementById("current").textContent=
formatTime(audio.currentTime);

document.getElementById("duration").textContent=
formatTime(audio.duration);

});

progress.addEventListener("input",()=>{

audio.currentTime=progress.value;

});

document.getElementById("volume")
.addEventListener("input",e=>{

audio.volume=e.target.value;

});

audio.addEventListener("ended",nextSong);

function formatTime(seconds){

if(isNaN(seconds)) return "0:00";

let min=Math.floor(seconds/60);
let sec=Math.floor(seconds%60);

if(sec<10) sec="0"+sec;

return `${min}:${sec}`;

}

loadSong(0);

</script>

</body>
</html>
